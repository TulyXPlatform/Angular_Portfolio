<div class="media-overlay" *ngIf="isOpen" (keydown.escape)="close()" tabindex="0">
  <!-- Top Toolbar -->
  <div class="toolbar">
    <div class="counter">{{ currentIndex + 1 }} / {{ mediaList.length }}</div>
    <div class="actions">
      <!-- Only show zoom controls for scalable image types -->
      <ng-container *ngIf="currentMedia.type === 'image'">
          <button (click)="zoomIn()" class="tool-btn" title="Zoom In"><i class="fas fa-search-plus"></i></button>
          <button (click)="zoomOut()" class="tool-btn" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
          <button (click)="resetTransforms()" class="tool-btn" title="Reset View"><i class="fas fa-compress"></i></button>
      </ng-container>
      <button (click)="toggleFullscreen()" class="tool-btn" title="Fullscreen"><i class="fas fa-expand"></i></button>
      <button (click)="close()" class="tool-btn close-btn" title="Close"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <button class="nav-btn prev-btn" (click)="prev()" [disabled]="currentIndex === 0">
      <i class="fas fa-chevron-left"></i>
  </button>
  
  <!-- Active Media Frame mapping purely distinct Structural DOM states per asset for performance optimization -->
  <div class="media-container" [ngSwitch]="currentMedia.type">
       
      <!-- IMAGE: Injected into Panzoom element container -->
      <div *ngSwitchCase="'image'" class="panzoom-container">
          <img #transformContainer [src]="currentMedia.url" draggable="false" class="zoom-layer" alt="Expanded Media">
      </div>
      
      <!-- VIDEO -->
      <div *ngSwitchCase="'video'" class="optimized-media-layer">
          <video controls autoplay [src]="currentMedia.url" preload="metadata"></video>
      </div>
      
      <!-- PDF (Using native iframe viewer) -->
      <div *ngSwitchCase="'pdf'" class="optimized-media-layer pdf-wrap">
          <iframe 
             [src]="currentMedia.url | safe" 
             style="width: 100%; height: 90vh; border: none;">
          </iframe>
      </div>

      <!-- CAD (fallback proxy logic) -->
      <div *ngSwitchCase="'cad'" class="optimized-media-layer">
          <img [src]="currentMedia.url" class="fallback-cad" alt="CAD Proxy Render">
      </div>
  </div>

  <button class="nav-btn next-btn" (click)="next()" [disabled]="currentIndex === mediaList.length - 1">
      <i class="fas fa-chevron-right"></i>
  </button>

  <!-- Thumbnail Navigation -->
  <div class="thumbnail-bar" *ngIf="mediaList.length > 1">
      <div class="thumb-track">
          <div *ngFor="let item of mediaList; let i = index" 
               class="thumb-tile"
               [class.active]="i === currentIndex"
               (click)="setIndex(i)">
               <img [src]="item.thumbnail || item.url" loading="lazy" *ngIf="item.type !== 'pdf'" alt="Thumb">
               <div class="pdf-thumb-proxy" *ngIf="item.type === 'pdf'">
                   <i class="fas fa-file-pdf"></i>
               </div>
          </div>
      </div>
  </div>
</div>
