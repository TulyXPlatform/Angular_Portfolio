<div class="media-overlay" *ngIf="isOpen">
  <div class="toolbar">
    <span class="counter">{{ currentIndex + 1 }} / {{ mediaList.length }}</span>
    <div class="actions">
      <button (click)="zoomIn()" class="tool-btn"><i class="fas fa-search-plus"></i></button>
      <button (click)="zoomOut()" class="tool-btn"><i class="fas fa-search-minus"></i></button>
      <button (click)="resetTransforms()" class="tool-btn"><i class="fas fa-compress"></i></button>
      <button (click)="toggleFullscreen()" class="tool-btn"><i class="fas fa-expand"></i></button>
      <button (click)="close()" class="tool-btn close-btn"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <button class="nav-btn prev-btn" (click)="prev()" [disabled]="currentIndex === 0"><i class="fas fa-chevron-left"></i></button>
  
  <div class="media-container" 
       (mousedown)="onMouseDown($event)"
       [class.grabbing]="isDragging"
       [class.zoomed]="zoomLevel > 1">
       
    <div class="transform-container" 
         [style.transform]="'translate(' + panX + 'px, ' + panY + 'px) scale(' + zoomLevel + ')'">
         
         <!-- Image -->
         <img *ngIf="currentMedia.type === 'image'" [src]="currentMedia.url" draggable="false">
         
         <!-- Video -->
         <video *ngIf="currentMedia.type === 'video'" controls [src]="currentMedia.url" [style.transform]="'scale(1)'"></video>
         
         <!-- PDF iframe or object -->
         <object *ngIf="currentMedia.type === 'pdf'" [data]="currentMedia.url" type="application/pdf" width="100%" height="800px">
           <p>Your browser does not support PDFs. <a [href]="currentMedia.url">Download it</a>.</p>
         </object>

         <!-- CAD (handled as SVG/PDF conversion via Cloudinary typically) -->
         <img *ngIf="currentMedia.type === 'cad'" [src]="currentMedia.url" draggable="false" alt="CAD Preview">
    </div>
  </div>

  <button class="nav-btn next-btn" (click)="next()" [disabled]="currentIndex === mediaList.length - 1"><i class="fas fa-chevron-right"></i></button>
</div>
