<header class="main-header blueprint-card" [class.scrolled]="isScrolled">
  <div class="logo-container">
    <a routerLink="/" class="logo">
      <span class="logo-mark">MHT</span>
      <span class="logo-text">Mahmud Hasan Tuhin</span>
      <span class="logo-title">Civil Engineer</span>
    </a>
  </div>
  <nav class="navigation" [class.mobile-open]="isMobileMenuOpen">
    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="toggleMobileMenu()">Home</a></li>
      <li><a routerLink="/about" routerLinkActive="active" (click)="toggleMobileMenu()">About</a></li>
      <li><a routerLink="/experience" routerLinkActive="active" (click)="toggleMobileMenu()">Experience</a></li>
      <li><a routerLink="/projects" routerLinkActive="active" (click)="toggleMobileMenu()">Projects</a></li>
      <li><a routerLink="/blog" routerLinkActive="active" (click)="toggleMobileMenu()">Blog</a></li>
      <li><a routerLink="/contact" routerLinkActive="active" (click)="toggleMobileMenu()">Contact</a></li>
    </ul>
    <div class="header-actions">
      <ng-content></ng-content>
    </div>
  </nav>
  
  <div class="mobile-menu-btn" (click)="toggleMobileMenu()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</header>
